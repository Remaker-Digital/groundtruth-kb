# Project-scoped Codex configuration for GroundTruth-KB.
#
# Codex hooks are enabled for this Windows workspace. Lifecycle hooks use
# no-space launchers under E:\GT-KB\.codex\gtkb-hooks so project paths do
# not break hook startup execution. Wrap-up is phrase-gated
# through UserPromptSubmit so normal assistant completions do not look like
# session boundaries.

[features]
codex_hooks = true
