# Project-scoped Codex configuration for GroundTruth-KB.
#
# WI-4896 containment: Codex hooks stay disabled in this Windows workspace until
# release-runtime no-window validation proves enabled hooks cannot spawn visible
# consoles.
# DELIB-FAB15-REMEDIATION-20260610: interactive Codex sessions default to
# approval_policy="on-request" with network disabled. Headless bridge-dispatch
# workers cannot answer approvals and must apply their "never" posture at
# dispatch/runtime scope rather than by making this project config permissive.

approval_policy = "on-request"
[features]
hooks = false
shell_snapshot = false

[sandbox_workspace_write]
network_access = false
