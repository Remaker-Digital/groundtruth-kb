# Project-scoped Codex configuration for Agent Red.
#
# Codex hooks are enabled for this Windows workspace. Lifecycle hooks use
# no-space launchers under C:\Users\micha\.codex\agent-red-hooks so project
# paths with spaces do not break hook startup execution. Wrap-up is phrase-gated
# through UserPromptSubmit so normal assistant completions do not look like
# session boundaries.

[features]
codex_hooks = true
