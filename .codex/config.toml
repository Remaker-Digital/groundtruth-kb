# Project-scoped Codex configuration for GroundTruth-KB.
#
# Codex hooks are enabled for this Windows workspace. Lifecycle hooks use
# no-space launchers under E:\GT-KB\.codex\gtkb-hooks so project paths do
# not break hook startup execution. Wrap-up is phrase-gated
# through UserPromptSubmit so normal assistant completions do not look like
# session boundaries.
# DELIB-FAB15-REMEDIATION-20260610: interactive Codex sessions default to
# approval_policy="on-request" with network disabled. Headless bridge-dispatch
# workers cannot answer approvals and must apply their "never" posture at
# dispatch/runtime scope rather than by making this project config permissive.

approval_policy = "on-request"
[features]
hooks = true

[sandbox_workspace_write]
network_access = false
