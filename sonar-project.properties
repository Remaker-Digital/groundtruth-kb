# SonarCloud configuration for agent-red
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

sonar.projectKey=mike-remakerdigital_agent-red
sonar.organization=mike-remakerdigital

sonar.sources=src/
sonar.tests=tests/
sonar.python.version=3.11,3.12

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude vendored/generated files
sonar.exclusions=docs-site/**,tools/knowledge-db/knowledge.db,scripts/**
