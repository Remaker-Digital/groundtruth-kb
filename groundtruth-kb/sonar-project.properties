# SonarCloud configuration for groundtruth-kb
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

sonar.projectKey=mike-remakerdigital_groundtruth
sonar.organization=mike-remakerdigital

sonar.sources=src/
sonar.tests=tests/
sonar.python.version=3.11,3.12,3.13

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclude template files from analysis (they ship as-is to users)
sonar.exclusions=templates/**,examples/**
