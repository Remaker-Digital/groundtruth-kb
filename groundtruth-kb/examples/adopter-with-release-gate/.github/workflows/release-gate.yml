name: Release Gate (placeholder)

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

# This workflow demonstrates the wiring pattern only. Adopters replace the
# `release-gate-stub` step with their own gate per their deployment pipeline.

jobs:
  release-gate:
    name: Adopter release-gate check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install gt CLI
        run: pip install groundtruth-kb

      - name: Verify isolation contract
        # Doctor must pass before the release gate runs.
        run: gt project doctor --profile dual-agent

      - name: Adopter release-gate stub
        # Placeholder. Adopters replace this with their actual gate logic
        # (e.g., SAST scan, dependency audit, deployment readiness check).
        run: bash scripts/release_gate_check.sh
