#
# Managed Artifact Registry — single source of truth for scaffold, upgrade, and doctor.
#
# 56 records = 20 hooks + 10 rules + 6 skills + 16 settings-hook-registrations + 4 gitignore-patterns.
#
# Three independent lifecycle axes per record:
#   - initial_profiles:          scaffold copies this artifact for these profiles
#   - managed_profiles:          upgrade enforces drift/missing-file repair for these profiles
#   - doctor_required_profiles:  doctor enforces presence as a simple required check for these profiles
#                                (empty = not required, or enforced via composite check)
#
# Loader invariants (InvalidArtifactRecord on violation):
#   - managed_profiles ⊆ initial_profiles
#   - doctor_required_profiles ⊆ initial_profiles
#
# Profile groups:
#   ALL     = ["local-only", "dual-agent", "dual-agent-webapp"]
#   bridge  = ["dual-agent", "dual-agent-webapp"]
#   none    = []

