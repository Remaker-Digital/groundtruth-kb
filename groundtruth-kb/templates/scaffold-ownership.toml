#
# Sibling Ownership Map — ownership-glob records keyed by path_glob.
#
# Every record has class = "ownership-glob" and carries the ownership block
# inline (no defaults are ever applied to ownership-glob rows).
#
# Loader invariants (InvalidArtifactRecord on violation):
#   - priority must be int (higher wins among overlapping globs)
#   - ownership / upgrade_policy REQUIRED on every row (no defaults)
#   - adopter_divergence_policy present iff upgrade_policy in
#     {overwrite, structured-merge, adopter-opt-in}
#   - id unique across both this file and managed-artifacts.toml
#
# Added by sub-bridge `gtkb-artifact-ownership-matrix-003` (GO -004).

# =========================================================================
# ADOPTER PROJECT FILES
# =========================================================================

[[artifacts]]
class = "ownership-glob"
id = "adopter-groundtruth-toml"
path_glob = "groundtruth.toml"
priority = 100
initial_profiles = ["local-only", "dual-agent", "dual-agent-webapp"]
managed_profiles = []
doctor_required_profiles = []
ownership = "gt-kb-scaffolded"
upgrade_policy = "preserve"
notes = "Written once at scaffold; adopter edits freely. Any scaffold_version bump is handled by a separate structured-patch mechanism, not this row."

