# Canonical terminology config for gt project doctor.
# Profile-aware: the doctor selects the matching [config.profiles.<profile>]
# block based on the project's scaffold profile (groundtruth.toml :: [project].profile).
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

[meta]
version = "1.0.0"
# Source: SPEC-TERMINOLOGY-PROFILE-MATRIX (in GT-KB MemBase).
# Per DELIB-0719: missing terms = ERROR, minor drift = WARN.

# GTKB-GOV-TERM-PRIMER-STARTUP Slice 1 (S327, 2026-05-02): added per-profile
# `required_primer_terms` field for the 22-term primer-content coverage contract,
# plus `primer_missing_severity`. Existing `required_startup_terms` semantics
# (terms required to appear in every entry of `required_files`) are preserved
# unchanged per Codex -004 F1 option 1.

# Shared owner-required primer minimum (per S327 owner directive).
# Reused per profile via the explicit list below; no inheritance to keep the
# doctor's profile-resolver simple.
# 21 generic terms (this template) = ADR-0001 core (MemBase, Deliberation Archive,
# MEMORY.md, Prime Builder, Loyal Opposition) + GT-KB platform/lifecycle/role/artifact
# vocabulary. Each adopter project also defines its own application-instance term
# (e.g., the project_name itself). The GT-KB checkout's own primer adds its
# instance term post-render for a 22-term self-install.

[config.profiles.local-only]
# Solo-Prime scaffold; intentionally no AGENTS.md (per test_scaffold_project.py:63-77).
required_files = ["CLAUDE.md", "MEMORY.md"]
optional_files = [".claude/rules/deliberation-protocol.md"]
required_startup_terms = ["MemBase", "Deliberation Archive", "MEMORY.md"]
missing_severity = "ERROR"
required_primer_terms = [
    "MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition",
    "GT-KB", "GroundTruth-KB", "GTKB", "platform", "application", "hosted application",
    "adopter", "project", "work item", "backlog", "specification",
    "requirement", "implementation proposal", "implementation report", "verification",
    "dashboard", "bridge",
]
primer_missing_severity = "ERROR"

[config.profiles.dual-agent]
required_files = ["CLAUDE.md", "AGENTS.md", "MEMORY.md", ".claude/rules/deliberation-protocol.md"]
required_startup_terms = ["MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition"]
missing_severity = "ERROR"
required_primer_terms = [
    "MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition",
    "GT-KB", "GroundTruth-KB", "GTKB", "platform", "application", "hosted application",
    "adopter", "project", "work item", "backlog", "specification",
    "requirement", "implementation proposal", "implementation report", "verification",
    "dashboard", "bridge",
]
primer_missing_severity = "ERROR"

[config.profiles.dual-agent-webapp]
# Extends dual-agent; no webapp-specific additional terminology files.
extends = "dual-agent"
required_files = ["CLAUDE.md", "AGENTS.md", "MEMORY.md", ".claude/rules/deliberation-protocol.md"]
required_startup_terms = ["MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition"]
missing_severity = "ERROR"
required_primer_terms = [
    "MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition",
    "GT-KB", "GroundTruth-KB", "GTKB", "platform", "application", "hosted application",
    "adopter", "project", "work item", "backlog", "specification",
    "requirement", "implementation proposal", "implementation report", "verification",
    "dashboard", "bridge",
]
primer_missing_severity = "ERROR"

[config.profiles.harness-memory]
# Opt-in profile for projects where MEMORY.md is held outside the project
# repo (e.g., managed by an external harness or orchestration layer).
# Used until the project is ready to adopt the default repo-tracked MEMORY.md layout.
# Harness-driven MEMORY.md lives outside the project repo; don't require MEMORY.md content check.
extends = "dual-agent"
memory_md_location = "harness"
required_files = ["CLAUDE.md", "AGENTS.md", ".claude/rules/deliberation-protocol.md"]
required_startup_terms = ["MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition"]
missing_severity = "ERROR"
required_primer_terms = [
    "MemBase", "Deliberation Archive", "MEMORY.md", "Prime Builder", "Loyal Opposition",
    "GT-KB", "GroundTruth-KB", "GTKB", "platform", "application", "hosted application",
    "adopter", "project", "work item", "backlog", "specification",
    "requirement", "implementation proposal", "implementation report", "verification",
    "dashboard", "bridge",
]
primer_missing_severity = "ERROR"

[config.defaults]
drift_severity = "WARN"
checked_trees = ["docs/", "templates/"]
ignore_paths = [
    "CLAUDE_ARCHIVE.md",
    "docs/archive/**",
    "archive/**",
    "bridge/**",
    "CHANGELOG.md",
]
# Primer file path used by required_primer_terms evaluation (Slice 1, S327).
primer_path = ".claude/rules/canonical-terminology.md"
