# GroundTruth KB project configuration
# Docs: https://github.com/Remaker-Digital/groundtruth-kb

[groundtruth]
db_path = "./groundtruth.db"
project_root = "."
app_title = "_test_golden_dual_agent"
brand_mark = "GT"
brand_color = "#2563eb"
# logo_url = ""
legal_footer = "Copyright 2026 GoldenFixtureOwner. All rights reserved."

[gates]
# Plug-in governance gates (dotted import paths)
# plugins = ["my_package.gates:MyCustomGate"]

[backup]
# Optional database snapshot settings. Defaults keep snapshots outside the
# adopter root and stage them in a non-synced user-local directory.
# snapshot_output_dir = ""
# snapshot_staging_dir = ""
# retain_recent = 7
# retain_daily_days = 30
# include_chroma = false
# sync_paths = []

[service]
# Phase 4 service-endpoint template (GTKB-ISOLATION-017 Slice 3).
# Override per environment. Per ADR-ISOLATION-APPLICATION-PLACEMENT-001,
# applications consume GT-KB through a service endpoint, not by mounting the
# product DB directly.
# endpoint = "https://gtkb.example.com/v1"
endpoint = "configure-me://placeholder/v1"

[project]
project_name = "_test_golden_dual_agent"
owner = "GoldenFixtureOwner"
profile = "dual-agent"
copyright_notice = "Copyright 2026 GoldenFixtureOwner. All rights reserved."
cloud_provider = "none"
scaffold_version = "0.7.0rc1"
created_at = "2026-06-12T02:14:01Z"
