<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Red — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      /* Stone neutral hierarchy: chrome #0c0a09 → page #1c1917 → surface #292524 → border #44403c */
      html, body { margin: 0; padding: 0; background: #0c0a09; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      /* Dark mode text color override (Stone 0) */
      html[data-mantine-color-scheme="dark"] { color: #fafaf9; }
      html[data-mantine-color-scheme="dark"] body { color: #fafaf9; }
      /* Card borders: visible 1px borders — Stone border token */
      [data-mantine-color-scheme="dark"] .mantine-Paper-root {
        --_paper-border-color: #44403c;
        border-color: #44403c;
        border-width: 1px;
      }
      /* Table row borders */
      [data-mantine-color-scheme="dark"] .mantine-Table-tr { border-color: #44403c; }
      [data-mantine-color-scheme="dark"] .mantine-Table-th,
      [data-mantine-color-scheme="dark"] .mantine-Table-td { border-color: #44403c; }
      /* Input / Select borders */
      [data-mantine-color-scheme="dark"] .mantine-Input-input,
      [data-mantine-color-scheme="dark"] .mantine-Select-input { border-color: #44403c; }
      /* Button borders (variant=default/outline) */
      [data-mantine-color-scheme="dark"] .mantine-Button-root[data-variant="default"],
      [data-mantine-color-scheme="dark"] .mantine-Button-root[data-variant="outline"] { border-color: #44403c; }
      /* Chip borders */
      [data-mantine-color-scheme="dark"] .mantine-Chip-label:not([data-checked]) { border-color: #44403c; }
      /* Accordion borders */
      [data-mantine-color-scheme="dark"] .mantine-Accordion-item { border-color: #44403c; }
      [data-mantine-color-scheme="dark"] .mantine-Accordion-control { border-color: #44403c; }
      /* Badge borders (variant=outline) */
      [data-mantine-color-scheme="dark"] .mantine-Badge-root[data-variant="outline"] { border-color: #44403c; }
      /* Divider borders */
      [data-mantine-color-scheme="dark"] .mantine-Divider-root {
        --_divider-color: #44403c;
        border-color: #44403c;
      }
      /* Badge text: sentence case — disable Mantine default uppercase transform */
      .mantine-Badge-label { text-transform: none; }
      /* Light mode: dark sticky header to match dark mode chrome */
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header {
        background: #0c0a09 !important;
        border-bottom-color: #292524 !important;
      }
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header .mantine-Text-root,
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header .mantine-ActionIcon-root { color: #fafaf9; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
