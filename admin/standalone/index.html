<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Red — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      html, body { margin: 0; padding: 0; background: #0a0a0a; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      /* Dark mode text color override */
      html[data-mantine-color-scheme="dark"] { color: #F5F5F5; }
      html[data-mantine-color-scheme="dark"] body { color: #F5F5F5; }
      /* Card borders: visible 1px borders — Mazel design revision (2026-02-03 mockup) */
      [data-mantine-color-scheme="dark"] .mantine-Paper-root {
        --_paper-border-color: #272727;
        border-color: #272727;
        border-width: 1px;
      }
      /* Table row borders: match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Table-tr { border-color: #272727; }
      [data-mantine-color-scheme="dark"] .mantine-Table-th,
      [data-mantine-color-scheme="dark"] .mantine-Table-td { border-color: #272727; }
      /* Input / Select borders: match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Input-input,
      [data-mantine-color-scheme="dark"] .mantine-Select-input { border-color: #272727; }
      /* Button borders (variant=default/outline): match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Button-root[data-variant="default"],
      [data-mantine-color-scheme="dark"] .mantine-Button-root[data-variant="outline"] { border-color: #272727; }
      /* Chip borders: match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Chip-label:not([data-checked]) { border-color: #272727; }
      /* Accordion borders: match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Accordion-item { border-color: #272727; }
      [data-mantine-color-scheme="dark"] .mantine-Accordion-control { border-color: #272727; }
      /* Badge borders (variant=outline): match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Badge-root[data-variant="outline"] { border-color: #272727; }
      /* Divider borders: match card border color — Mazel design revision */
      [data-mantine-color-scheme="dark"] .mantine-Divider-root {
        --_divider-color: #272727;
        border-color: #272727;
      }
      /* Light mode: dark sticky header to match dark mode chrome */
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header {
        background: #0a0a0a !important;
        border-bottom-color: #1E1E1E !important;
      }
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header .mantine-Text-root,
      html[data-mantine-color-scheme="light"] .mantine-AppShell-header .mantine-ActionIcon-root { color: #F5F5F5; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
