name: Secrets Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-secrets:
    name: Redacted GT-KB scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GroundTruth KB package
        run: python -m pip install -e groundtruth-kb

      - name: Run redacted GT-KB secret scan
        run: |
          mkdir -p .quality
          python -m groundtruth_kb secrets scan \
            --tracked \
            --redacted \
            --report-json .quality/gtkb-secrets-compat.json \
            --fail-on verified-provider

          echo "## Secrets Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Redacted GT-KB scanner completed. See the uploaded JSON report." >> $GITHUB_STEP_SUMMARY

      - name: Upload redacted scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-compat-redacted-report
          path: .quality/gtkb-secrets-compat.json
          if-no-files-found: error
          retention-days: 30
