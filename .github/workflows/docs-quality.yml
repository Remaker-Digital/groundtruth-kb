# Documentation Quality CI Pipeline
#
# Runs on every PR that touches docs-site/ files.
# Also runs weekly to catch rotted external links.
#
# Checks:
#   1. Docusaurus build (strict mode — broken links, duplicate routes)
#   2. Vale prose linting (Google style, readability, terminology, inclusivity)
#   3. markdownlint (Markdown formatting consistency)
#   4. markdown-link-check (external link validation)
#   5. Documentation coverage audit report
#
# (c) 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Docs Quality

on:
  pull_request:
    paths:
      - 'applications/Agent_Red/docs-site/**'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
    paths:
      - 'applications/Agent_Red/docs-site/**'
  schedule:
    # Weekly link rot check — Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

defaults:
  run:
    working-directory: applications/Agent_Red/docs-site

jobs:
  # ---------- Build ----------
  build:
    name: Docusaurus Build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: applications/Agent_Red/docs-site/package-lock.json

      - run: npm ci
      - run: npm run build

  # ---------- Vale ----------
  vale:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    env:
      VALE_VERSION: '3.14.1'
    steps:
      - uses: actions/checkout@v4

      - name: Vale Prose Lint
        working-directory: .
        run: |
          curl -fsSL -o vale.tar.gz "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          tar -xzf vale.tar.gz vale
          ./vale --config=applications/Agent_Red/docs-site/.vale.ini sync
          ./vale --config=applications/Agent_Red/docs-site/.vale.ini applications/Agent_Red/docs-site/docs

  # ---------- markdownlint ----------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm run lint:md
        working-directory: applications/Agent_Red/docs-site

  # ---------- Link Check ----------
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm run lint:links
        working-directory: applications/Agent_Red/docs-site

  # ---------- Coverage Report ----------
  coverage:
    name: Docs Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/docs-coverage-audit.mjs
        working-directory: applications/Agent_Red/docs-site
