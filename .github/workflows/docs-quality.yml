# Documentation Quality CI Pipeline
#
# Runs on every PR that touches docs-site/ files.
# Also runs weekly to catch rotted external links.
#
# Checks:
#   1. Docusaurus build (strict mode — broken links, duplicate routes)
#   2. Vale prose linting (Google style, readability, terminology, inclusivity)
#   3. markdownlint (Markdown formatting consistency)
#   4. markdown-link-check (external link validation)
#   5. Documentation coverage audit report
#
# (c) 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Docs Quality

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-quality.yml'
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
  schedule:
    # Weekly link rot check — Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

defaults:
  run:
    working-directory: docs-site

jobs:
  # ---------- Build ----------
  build:
    name: Docusaurus Build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - run: npm ci
      - run: npm run build

  # ---------- Vale ----------
  vale:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@v2
        with:
          files: docs-site/docs
          vale_flags: "--config=docs-site/.vale.ini"
          reporter: github-pr-review
          fail_on_error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- markdownlint ----------
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npx markdownlint-cli2
        working-directory: docs-site

  # ---------- Link Check ----------
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npx markdown-link-check --config .markdown-link-check.json docs/**/*.md
        working-directory: docs-site

  # ---------- Coverage Report ----------
  coverage:
    name: Docs Coverage Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: node scripts/docs-coverage-audit.mjs
        working-directory: docs-site
