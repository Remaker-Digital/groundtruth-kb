# Deploy Agent Red documentation site to GitHub Pages
# Triggers on push to main when docs-site/ files change
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Deploy docs site

on:
  push:
    branches: [main]
    paths:
      - 'applications/Agent_Red/docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch: # Allow manual trigger

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: applications/Agent_Red/docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Build site
        working-directory: docs-site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: applications/Agent_Red/docs-site/build

  pages-check:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Check whether GitHub Pages is enabled
        id: pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/${{ github.repository }}/pages" >/tmp/pages.json 2>/tmp/pages.err; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "GitHub Pages is not enabled for this repository; skipping deployment."
            cat /tmp/pages.err
          fi

  deploy:
    if: needs.pages-check.outputs.enabled == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, pages-check]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # SPEC-1784: Trigger Co-Pilot Knowledge ingestion after docs deploy
  # Belt-and-suspenders: primary ingestion is on app startup (lifecycle.py),
  # this ensures immediate ingestion when docs change without waiting for
  # the next container restart.
  trigger-ingestion:
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Trigger staging Co-Pilot docs ingestion
        continue-on-error: true  # Non-blocking — startup ingestion is the primary mechanism
        run: |
          curl -sf -X POST \
            "${{ secrets.STAGING_API_URL }}/api/superadmin/copilot/ingest/docs-site" \
            -H "X-API-Key: ${{ secrets.STAGING_SPA_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Staging ingestion trigger skipped (not configured or unavailable)"

      - name: Trigger production Co-Pilot docs ingestion
        continue-on-error: true
        run: |
          curl -sf -X POST \
            "${{ secrets.PRODUCTION_API_URL }}/api/superadmin/copilot/ingest/docs-site" \
            -H "X-API-Key: ${{ secrets.PRODUCTION_SPA_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 120 || echo "Production ingestion trigger skipped (not configured or unavailable)"
