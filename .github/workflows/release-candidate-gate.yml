name: Release Candidate Gate

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'admin/**'
      - 'widget/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-candidate-gate.yml'
  push:
    branches: [main, develop, 'hotfix/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'admin/**'
      - 'widget/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-candidate-gate.yml'
  workflow_dispatch:

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-gate:
    name: Python release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^agntcy-app-sdk' requirements.txt > /tmp/requirements-filtered.txt
          grep -v -E '^(agntcy-app-sdk|locust|^-r )' requirements-test.txt > /tmp/test-deps.txt
          pip install -r /tmp/requirements-filtered.txt
          pip install -r /tmp/test-deps.txt
          pip install bandit[toml] pip-audit ruff

      - name: Run release-candidate gate
        run: python scripts/release_candidate_gate.py --require-python 3.12 --skip-frontend

  frontend-gate:
    name: Frontend build and widget tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm --prefix widget ci
          npm --prefix admin/standalone ci
          npm --prefix admin/provider ci
          npm --prefix admin/shopify ci

      - name: Run frontend release-candidate gate
        shell: pwsh
        run: python scripts/release_candidate_gate.py --skip-python --include-frontend
