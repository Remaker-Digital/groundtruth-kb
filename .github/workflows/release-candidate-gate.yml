name: Release Candidate Gate

on:
  pull_request:
    paths:
      - 'applications/Agent_Red/src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'applications/Agent_Red/admin/**'
      - 'applications/Agent_Red/widget/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-candidate-gate.yml'
      # Sub-slice F release-metric implementation surface (per Codex -004 F3):
      # ensure release-candidate gate runs when metric code, tests, evidence,
      # or helper hooks change.
      - 'groundtruth-kb/src/**'
      - 'groundtruth-kb/tests/**'
      - 'memory/**'
      - 'bridge/**'
      - '.claude/hooks/**'
  push:
    branches: [main, develop, 'hotfix/**']
    paths:
      - 'applications/Agent_Red/src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'applications/Agent_Red/admin/**'
      - 'applications/Agent_Red/widget/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/release-candidate-gate.yml'
      - 'groundtruth-kb/src/**'
      - 'groundtruth-kb/tests/**'
      - 'memory/**'
      - 'bridge/**'
      - '.claude/hooks/**'
  workflow_dispatch:

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-gate:
    name: Python release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^agntcy-app-sdk' requirements.txt > /tmp/requirements-filtered.txt
          grep -v -E '^(agntcy-app-sdk|locust|^-r )' requirements-test.txt > /tmp/test-deps.txt
          pip install -r /tmp/requirements-filtered.txt
          pip install -r /tmp/test-deps.txt
          pip install bandit[toml] pip-audit ruff

      # Override the v0.6.1 pin from requirements-test.txt with the in-repo
      # groundtruth-kb source so CI tests target the same API surface as the
      # rest of the repo. Per S330 Slice 8.6 catalog rows 26-34: 9
      # `_check_smart_bridge_poller` tests fail in CI when CI installs
      # v0.6.1 (predates the function). Non-editable install satisfies the
      # `REQUIREMENTS_EDITABLE_GTKB_SIBLING` governance gate (which only
      # rejects `-e` form in requirement files; workflow-driven non-editable
      # installs are allowed).
      - name: Install local groundtruth-kb source
        run: pip install --upgrade ./groundtruth-kb[search]

      # Seed groundtruth.db with the MemBase records that governance_adoption +
      # session_self_initialization tests assert. groundtruth.db is gitignored
      # per owner decision 2026-04-24 (commit 23a54af3); CI must materialize the
      # records from applications/Agent_Red/tests/fixtures/ci_membase_seed.json before pytest runs.
      # Per DELIB-S330-SLICE-8-6-PHASE-1-5-CI-DB-SEED-CHOICE (Option A).
      - name: Seed CI MemBase records
        run: python scripts/membase_ci_seed.py seed

      - name: Run release-candidate gate
        run: python scripts/release_candidate_gate.py --require-python 3.12 --skip-frontend

      # Sub-slice F of GTKB-GOV-AUQ-ENFORCEMENT-STACK: release-metric gate.
      # Enforces: GOV-OWNER-DECISION-SURFACING-001; GOV-REQUIREMENTS-COLLECTION-HOOK-001 v3
      # (AUQ-only invariant); GOV-FILE-BRIDGE-AUTHORITY-001 (Owner Decisions section).
      # See bridge/gtkb-gov-auq-enforcement-stack-slice-f-release-metrics-2026-05-04 for approved scope.
      - name: AUQ governance metrics gate
        run: python scripts/release_governance_metrics.py

  frontend-gate:
    name: Frontend build and applications/Agent_Red/widget tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          npm --prefix applications/Agent_Red/widget ci
          npm --prefix applications/Agent_Red/admin ci
          npm --prefix applications/Agent_Red/admin/standalone ci
          npm --prefix applications/Agent_Red/admin/provider ci
          npm --prefix applications/Agent_Red/admin/shopify ci

      - name: Prepare CI frontend environment
        shell: pwsh
        run: |
          @"
          VITE_API_URL=http://localhost:8000
          VITE_SHOPIFY_API_KEY=ci_dummy_shopify_key
          AGENT_RED_GITHUB_REPO=Remaker-Digital/agent-red-customer-engagement
          GROUND_TRUTH_GITHUB_REPO=Remaker-Digital/groundtruth-kb
          "@ | Set-Content -Path .env.local -Encoding UTF8 -NoNewline

      - name: Run frontend release-candidate gate
        shell: pwsh
        run: python scripts/release_candidate_gate.py --skip-python --include-frontend
