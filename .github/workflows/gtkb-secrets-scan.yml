name: GT-KB Secrets Scan

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "codex/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Redacted shared scanner
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install GroundTruth KB package
        run: python -m pip install -e groundtruth-kb

      - name: Run redacted GT-KB secret scan
        run: |
          mkdir -p .quality
          python -m groundtruth_kb secrets scan \
            --tracked \
            --redacted \
            --report-json .quality/gtkb-secrets.json \
            --fail-on verified-provider

      - name: Upload redacted secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gtkb-secrets-redacted-report
          path: .quality/gtkb-secrets.json
          if-no-files-found: error
