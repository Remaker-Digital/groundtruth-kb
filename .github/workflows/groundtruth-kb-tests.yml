name: GroundTruth KB Tests

on:
  pull_request:
    paths:
      - "groundtruth-kb/**"
      - ".github/workflows/groundtruth-kb-tests.yml"
      # Cross-harness parity hard gate (Slice 6): trigger on harness-surface changes.
      - "config/agent-control/harness-capability-registry.toml"
      - "scripts/parity_discovery_diff.py"
      - "scripts/check_harness_parity.py"
      - ".claude/settings.json"
      - ".codex/hooks.json"
      - "platform_tests/scripts/test_parity_*.py"
  push:
    branches: [main, develop, "hotfix/**"]
    paths:
      - "groundtruth-kb/**"
      - ".github/workflows/groundtruth-kb-tests.yml"
      - "config/agent-control/harness-capability-registry.toml"
      - "scripts/parity_discovery_diff.py"
      - "scripts/check_harness_parity.py"
      - ".claude/settings.json"
      - ".codex/hooks.json"
      - "platform_tests/scripts/test_parity_*.py"
  workflow_dispatch:

concurrency:
  group: groundtruth-kb-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-tests:
    name: GroundTruth KB platform tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: groundtruth-kb/pyproject.toml

      - name: Install GroundTruth KB test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "./groundtruth-kb[dev,search]"

      - name: Cross-harness parity discovery-diff hard gate
        run: |
          python scripts/parity_discovery_diff.py

      - name: Run GroundTruth KB platform tests
        working-directory: groundtruth-kb
        run: |
          mkdir -p .pytest-results
          python -m pytest tests/ -q --tb=short --junitxml=.pytest-results/groundtruth-kb-tests.xml

      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: groundtruth-kb-pytest-results
          path: groundtruth-kb/.pytest-results/groundtruth-kb-tests.xml
