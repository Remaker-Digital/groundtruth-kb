# Python Test CI Pipeline
#
# Runs pytest with coverage on every PR and push to main.
# Fails on test failure or coverage below threshold (pyproject.toml: fail_under=70).
#
# Work Items #104 (Test Infrastructure), #105 (Coverage Gate).
#
# (c) 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Python Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install production deps, skipping agntcy-app-sdk which requires
          # slim-bindings (gRPC native build) and is not imported by any source module.
          grep -v '^agntcy-app-sdk' requirements.txt > /tmp/requirements-filtered.txt
          pip install -r /tmp/requirements-filtered.txt
          # Install test-only deps (pytest, pytest-asyncio, pytest-cov)
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=json:coverage.json \
            --cov-fail-under=70 \
            --junitxml=test-results.xml \
            --ignore=tests/integration_real_services.py \
            --ignore=tests/integration

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.json
            test-results.xml
            htmlcov/
          retention-days: 30

      - name: Coverage and test summary
        if: always()
        run: |
          echo "## Test Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Extract test counts from JUnit XML
          if [ -f test-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' test-results.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' test-results.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' test-results.xml | head -1)
            echo "### Tests" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests run | ${TESTS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | ${FAILURES:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${ERRORS:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Extract coverage percentage from XML
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.1f}')
          " 2>/dev/null || echo "N/A")

            # Determine badge color based on coverage
            BADGE_COLOR="red"
            COV_NUM=$(echo "$COVERAGE" | cut -d'.' -f1)
            if [ "$COV_NUM" -ge 90 ]; then BADGE_COLOR="brightgreen"
            elif [ "$COV_NUM" -ge 80 ]; then BADGE_COLOR="green"
            elif [ "$COV_NUM" -ge 70 ]; then BADGE_COLOR="yellowgreen"
            elif [ "$COV_NUM" -ge 60 ]; then BADGE_COLOR="yellow"
            elif [ "$COV_NUM" -ge 50 ]; then BADGE_COLOR="orange"
            fi

            echo "### Coverage" >> $GITHUB_STEP_SUMMARY
            echo "![Coverage](https://img.shields.io/badge/coverage-${COVERAGE}%25-${BADGE_COLOR})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Line coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Minimum required | 70% |" >> $GITHUB_STEP_SUMMARY
            echo "| Launch target | 80% |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Per-module coverage breakdown from JSON
          if [ -f coverage.json ]; then
            echo "### Module Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('coverage.json') as f:
              data = json.load(f)
          files = data.get('files', {})
          print('| Module | Stmts | Miss | Cover |')
          print('|--------|-------|------|-------|')
          # Sort by coverage ascending (worst first)
          entries = []
          for path, info in files.items():
              summary = info.get('summary', {})
              stmts = summary.get('num_statements', 0)
              miss = summary.get('missing_lines', 0)
              pct = summary.get('percent_covered', 0)
              short = path.replace('src/', '')
              entries.append((pct, short, stmts, miss))
          entries.sort()
          # Show bottom 10 (lowest coverage)
          for pct, short, stmts, miss in entries[:10]:
              print(f'| {short} | {stmts} | {miss} | {pct:.0f}% |')
          if len(entries) > 10:
              print(f'| ... ({len(entries) - 10} more modules above 70%) | | | |')
          " >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          fi
