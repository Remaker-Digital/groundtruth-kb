# Security scanning — Semgrep SAST + Bandit Python security + pip-audit + Docker Scout
# Runs on every PR to develop/main and on push to develop.
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Security Scan

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile*'
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
  push:
    branches: [develop, 'hotfix/**']
    paths:
      - 'src/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile*'
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          mkdir -p .quality
          semgrep --config p/python --config p/security-audit --config p/secrets \
            --json --output .quality/semgrep.json \
            --exclude .git --exclude .venv --exclude node_modules \
            --exclude "admin/**/node_modules" --exclude "admin/**/dist" \
            --exclude "widget/node_modules" --exclude "widget/dist" \
            . || true
          semgrep --config p/python --config p/security-audit --config p/secrets \
            --exclude .git --exclude .venv --exclude node_modules \
            --exclude "admin/**/node_modules" --exclude "admin/**/dist" \
            --exclude "widget/node_modules" --exclude "widget/dist" \
            .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: .quality/semgrep.json

  bandit:
    name: Bandit Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit[toml]
          mkdir -p .quality
          bandit -r src/ -c pyproject.toml -f json -o .quality/bandit.json || true
          bandit -r src/ -ll -c pyproject.toml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: .quality/bandit.json

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          mkdir -p .quality
          pip-audit --format=json --output=.quality/pip-audit.json || true
          pip-audit

  scout:
    name: Docker Scout (container CVEs)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: acragentredeastus.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build image for scanning
        run: docker build -t agent-red-scan:local . --no-cache

      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://agent-red-scan:local
          only-severities: critical,high
          exit-code: true
