# Security scanning — Semgrep SAST + Bandit Python security + pip-audit + Docker Scout
# Runs on every PR to develop/main and on push to develop.
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Security Scan

on:
  pull_request:
    paths:
      - 'applications/Agent_Red/src/**'
      - 'platform_tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile*'
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
  push:
    branches: [develop, 'hotfix/**']
    paths:
      - 'applications/Agent_Red/src/**'
      - 'platform_tests/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - 'Dockerfile*'
      - 'scripts/**'
      - '.github/workflows/security-scan.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          mkdir -p .quality
          semgrep --config p/python --config p/security-audit --config p/secrets \
            --json --output .quality/semgrep.json \
            --exclude .git --exclude .venv --exclude node_modules \
            --exclude "applications/Agent_Red/admin/**/node_modules" --exclude "applications/Agent_Red/admin/**/dist" \
            --exclude "applications/Agent_Red/widget/node_modules" --exclude "applications/Agent_Red/widget/dist" \
            . || true
          semgrep --config p/python --config p/security-audit --config p/secrets \
            --exclude .git --exclude .venv --exclude node_modules \
            --exclude "applications/Agent_Red/admin/**/node_modules" --exclude "applications/Agent_Red/admin/**/dist" \
            --exclude "applications/Agent_Red/widget/node_modules" --exclude "applications/Agent_Red/widget/dist" \
            .

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: .quality/semgrep.json

  bandit:
    name: Bandit Python Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: |
          pip install bandit[toml]
          mkdir -p .quality
          bandit -r applications/Agent_Red/src/ -c pyproject.toml -f json -o .quality/bandit.json || true
          bandit -r applications/Agent_Red/src/ -ll -c pyproject.toml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: .quality/bandit.json

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit (waive CVE-2026-3219 only)
        # Per DELIB-S330-SLICE-8-6-ROW-42-PIP-CVE-CHOICE (S330 owner directive,
        # fallback path: "--ignore-vuln CVE-2026-3219 if no safe version
        # exists"):
        #
        # CI environment ships pip 26.x (default for setup-python@v5 +
        # python-version 3.12), which carries CVE-2026-3219 with no
        # upstream fix. The original directive's primary path was to pin
        # pip<26, but pip<26 reintroduces CVE-2026-1703 (fixed in 26.0+);
        # pinning trades one CVE for another. Suppression by ID is the
        # surviving cleanest path.
        #
        # Scope: CVE-2026-3219 ONLY. All other vulnerabilities still fail
        # the gate. Expiry: revisit at v0.7.0 GA when a fixed pip is
        # available. Residual risk: pip resolver attack surface in CI
        # release-candidate gate environment only; production runtime
        # image does not invoke pip.
        run: |
          pip install pip-audit
          mkdir -p .quality
          pip-audit --ignore-vuln CVE-2026-3219 --format=json --output=.quality/pip-audit.json || true
          pip-audit --ignore-vuln CVE-2026-3219

  scout:
    name: Docker Scout (container CVEs)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Scout ACR secrets
        env:
          ACR_SCOUT_USERNAME: ${{ secrets.ACR_SCOUT_USERNAME }}
          ACR_SCOUT_PASSWORD: ${{ secrets.ACR_SCOUT_PASSWORD }}
          DOCKER_SCOUT_HUB_USER: ${{ secrets.DOCKER_SCOUT_HUB_USER }}
          DOCKER_SCOUT_HUB_PAT: ${{ secrets.DOCKER_SCOUT_HUB_PAT }}
        run: |
          if [ -z "$ACR_SCOUT_USERNAME" ]; then
            echo "::error::ACR_SCOUT_USERNAME is required for Docker Scout ACR login"
            exit 1
          fi
          if [ -z "$ACR_SCOUT_PASSWORD" ]; then
            echo "::error::ACR_SCOUT_PASSWORD is required for Docker Scout ACR login"
            exit 1
          fi
          if [ -z "$DOCKER_SCOUT_HUB_USER" ]; then
            echo "::error::DOCKER_SCOUT_HUB_USER is required for Docker Scout authentication"
            exit 1
          fi
          if [ -z "$DOCKER_SCOUT_HUB_PAT" ]; then
            echo "::error::DOCKER_SCOUT_HUB_PAT is required for Docker Scout authentication"
            exit 1
          fi

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: acragentredeastus.azurecr.io
          username: ${{ secrets.ACR_SCOUT_USERNAME }}
          password: ${{ secrets.ACR_SCOUT_PASSWORD }}

      - name: Login to Docker Hub for Docker Scout
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_SCOUT_HUB_USER }}
          password: ${{ secrets.DOCKER_SCOUT_HUB_PAT }}

      - name: Build image for scanning
        run: docker build -t agent-red-scan:local . --no-cache

      # Per DELIB-S330-SLICE-8-6-ROW-43-DOCKER-SCOUT-WAIVER (S330 owner directive):
      # waive 2 specific high-severity container-base CVEs that have no
      # upstream fix:
      #   - CVE-2026-33845 in gnutls28
      #   - CVE-2026-5435 in glibc
      # Scope: those 2 CVE IDs ONLY. Future CVEs are NOT waived (the post-step
      # verification fails the gate on any unwaived critical/high CVE).
      # Expiry: base-image rebuild — soft v0.7.0 GA, hard v0.8.0. Residual
      # risk: production-deployment hardening covers exposure of these
      # specific CVEs; backlog row GTKB-DOCKER-SCOUT-CVE-WAIVER-EXPIRY-001
      # tracks removal at GA.
      - name: Run Docker Scout (capture findings, no exit on CVE)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: local://agent-red-scan:local
          only-severities: critical,high
          format: sarif
          output: scout-cves.sarif
          # exit-code intentionally left default (false) so we can apply the
          # waiver evaluation in the next step.

      - name: Evaluate Scout findings against waiver
        run: |
          set -euo pipefail
          WAIVED="CVE-2026-33845 CVE-2026-5435"
          if [ ! -f scout-cves.sarif ]; then
            echo "::warning::No scout-cves.sarif produced; treating as no findings."
            exit 0
          fi
          # Extract every CVE ID from the SARIF result rules section.
          FINDINGS=$(jq -r '.runs[0].tool.driver.rules[]?.id // empty' scout-cves.sarif 2>/dev/null | sort -u || true)
          if [ -z "$FINDINGS" ]; then
            echo "Docker Scout: no critical/high CVE findings."
            exit 0
          fi
          echo "Docker Scout findings (critical/high):"
          echo "$FINDINGS" | sed 's/^/  - /'
          UNWAIVED=""
          while IFS= read -r cve; do
            case " $WAIVED " in
              *" $cve "*) ;;
              *) UNWAIVED="$UNWAIVED $cve" ;;
            esac
          done <<< "$FINDINGS"
          UNWAIVED=$(echo "$UNWAIVED" | tr -s ' ')
          if [ -n "$UNWAIVED" ] && [ "$UNWAIVED" != " " ]; then
            echo "::error::Unwaived critical/high CVEs found:$UNWAIVED"
            echo "::error::Waiver covers ONLY: $WAIVED (per DELIB-S330-SLICE-8-6-ROW-43-DOCKER-SCOUT-WAIVER)"
            exit 1
          fi
          echo "All critical/high CVEs are covered by the active waiver."
