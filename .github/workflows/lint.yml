# Python Lint Pipeline
#
# Runs ruff (linting + formatting check) on every PR and push to main/develop.
# Ruff replaces flake8 + isort + pyupgrade in a single fast tool.
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

name: Lint

on:
  pull_request:
    paths:
      - 'applications/Agent_Red/src/**'
      - 'platform_tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - '.github/workflows/lint.yml'
  push:
    branches: [main, develop, 'hotfix/**']
    paths:
      - 'applications/Agent_Red/src/**'
      - 'platform_tests/**'
      - 'scripts/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Ruff Lint + Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (blocking — E/F only, SPEC-1697)
        # E = pycodestyle errors, F = pyflakes (undefined names, unused imports).
        # These are the highest-signal rules and MUST pass.
        run: ruff check applications/Agent_Red/src/ platform_tests/ --select E,F --output-format=github

      - name: Ruff check (advisory — all configured rules)
        # Full rule set including I, UP, B, SIM — advisory until backlog cleared.
        continue-on-error: true
        run: ruff check applications/Agent_Red/src/ platform_tests/ --output-format=github

      - name: Ruff format check
        continue-on-error: true
        run: ruff format --check applications/Agent_Red/src/ platform_tests/ --diff

  import-cycles:
    name: Import Cycle Detection (SPEC-1695)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Detect circular imports in applications/Agent_Red/src/
        run: python scripts/detect_import_cycles.py applications/Agent_Red/src

  pip-audit:
    name: Dependency Vulnerability Scan (SPEC-1696)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit and dependencies
        run: |
          python -m pip install --upgrade pip
          grep -v '^agntcy-app-sdk' requirements.txt > /tmp/req-filtered.txt
          pip install -r /tmp/req-filtered.txt
          pip install pip-audit

      - name: Run pip-audit (blocking)
        run: pip-audit

  complexity:
    name: Complexity and Dead Code Analysis (SPEC-1699)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install radon and vulture
        run: pip install radon vulture

      - name: Radon cyclomatic complexity (advisory)
        continue-on-error: true
        run: radon cc applications/Agent_Red/src/ -a -nc --total-average

      - name: Vulture dead code detection (advisory)
        continue-on-error: true
        run: vulture applications/Agent_Red/src/ --min-confidence 90 || true

  syntax:
    name: Python Syntax Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile all Python files
        run: |
          python -c "
          import py_compile, sys, os

          errors = []
          for root, dirs, files in os.walk('applications/Agent_Red/src'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          py_compile.compile(path, doraise=True)
                      except py_compile.PyCompileError as e:
                          errors.append(str(e))

          if errors:
              print(f'FAIL: {len(errors)} syntax errors:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          else:
              count = sum(1 for r, _, fs in os.walk('applications/Agent_Red/src') for f in fs if f.endswith('.py'))
              print(f'OK: {count} Python files compiled successfully')
          "
