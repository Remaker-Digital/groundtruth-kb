version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "pip"
    directory: "/groundtruth-kb"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "groundtruth-kb"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/applications/Agent_Red"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "agent-red"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/applications/Agent_Red/widget"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "widget"
      - "agent-red"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/applications/Agent_Red/admin"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "admin"
      - "agent-red"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "npm"
    directory: "/applications/Agent_Red/docs-site"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docs"
      - "agent-red"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps):"
