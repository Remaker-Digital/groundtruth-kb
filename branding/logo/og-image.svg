  >AR</text>

  <!-- Wordmark -->
  <text
    x="508"
    y="295"
    font-family="Inter, 'Inter', sans-serif"
    font-weight="700"
    font-size="64"
    fill="#FFFFFF"
    letter-spacing="-1.5"
  >Agent</text>
  <text
    x="752"
    y="295"
    font-family="Inter, 'Inter', sans-serif"
    font-weight="700"
    font-size="64"
    fill="#C41E2A"
    letter-spacing="-1.5"
  >Red</text>

  <!-- Tagline -->
  <text
    x="600"
    y="400"
    font-family="Inter, 'Inter', sans-serif"
