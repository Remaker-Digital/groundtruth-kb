# GroundTruth CI — Deploy workflow
# Deploys a built container image to staging or production.
# Triggered manually via workflow_dispatch with environment selection.
#
# Customize: adjust deployment target (Azure Container Apps, AWS ECS, etc.)
# Required secrets: AZURE_CREDENTIALS (or equivalent for your cloud provider)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: "Image tag to deploy (e.g., 1.0.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists
        run: |
          echo "Deploying ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"
          echo "Target: ${{ inputs.environment }}"

      # --- Replace this section with your cloud provider's deployment ---
      # Example: Azure Container Apps
      # - name: Azure Login
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Deploy to Container Apps
      #   uses: azure/container-apps-deploy-action@v1
      #   with:
      #     containerAppName: my-app-${{ inputs.environment }}
      #     resourceGroup: my-resource-group
      #     imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
      # ---

      - name: Run post-deploy assertions
        run: |
          pip install "groundtruth-kb @ git+https://github.com/Remaker-Digital/groundtruth-kb.git@v0.1.1"
          gt --config groundtruth.toml assert
          echo "Post-deploy assertions passed"
