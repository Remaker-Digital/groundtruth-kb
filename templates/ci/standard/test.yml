# GroundTruth CI — Standard test workflow (dual-agent profile)
# Runs ruff linting and GroundTruth assertions on every push and PR.
# Advisory pytest/mypy blocks are present as comments — uncomment when ready.
# No Docker steps.
#
# Generated by: gt project init --profile dual-agent

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python {{PYTHON_VERSION}}
        uses: actions/setup-python@v5
        with:
          python-version: "{{PYTHON_VERSION}}"

      - name: Install groundtruth-kb
        run: |
          python -m pip install --upgrade pip
          pip install "groundtruth-kb[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run GroundTruth assertions
        run: gt --config groundtruth.toml assert

      # --- Uncomment when you add src/ and tests/ to this project ---
