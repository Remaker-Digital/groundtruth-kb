# GroundTruth CI — Full test workflow (dual-agent-webapp profile)
# Runs pytest, ruff linting, GroundTruth assertions, and optional mypy.
#
# Generated by: gt project init --profile dual-agent-webapp

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python {{PYTHON_VERSION}}
        uses: actions/setup-python@v5
        with:
          python-version: "{{PYTHON_VERSION}}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run GroundTruth assertions
        run: gt --config groundtruth.toml assert

      # --- Uncomment to enable strict type checking ---
      # - name: Type check
      #   run: mypy src/
