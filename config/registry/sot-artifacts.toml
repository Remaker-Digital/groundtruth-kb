# Platform SoT Artifact Registry — single source of truth for every SoT class in GT-KB.
#
# Authority: GOV-PLATFORM-SOT-REGISTRY-001 (registration mandatory).
# Schema:    DCL-SOT-REGISTRY-RECORD-SCHEMA-001 (per-record fields).
# Parity:    DCL-SOT-REGISTRY-PROJECTION-PARITY-001 (TOML ↔ MemBase sot_artifacts table).
#
# Bootstrap inventory derived from memory/research_sot_consolidation_2026_06_04.md §2
# (22 SoT classes identified during umbrella research). Row 1 IS the registry itself.
#
# This file is the human-edit surface. MemBase sot_artifacts table is the projection.
# Mutate via: edit this TOML → `gt registry sync` → next SessionStart confirms parity.
#
# Per-record schema (DCL-SOT-REGISTRY-RECORD-SCHEMA-001):
#   Required: id, domain, lifecycle, storage_path, authority_spec_id, mutation_api,
#             versioning_policy, backup_policy, health_check_function, owner_role
#   Optional: depends_on, forbidden_substitutes, notes

# =========================================================================
# Row 1: registry self-reference (bootstrap guarantee per DCL-SOT-REGISTRY-PROJECTION-PARITY-001)
# =========================================================================

[[artifacts]]
id = "sot-registry-toml"
domain = "control_surface"
lifecycle = "active"
storage_path = "config/registry/sot-artifacts.toml"
authority_spec_id = "GOV-PLATFORM-SOT-REGISTRY-001"
mutation_api = "gt registry sync; or direct TOML edit + commit"
versioning_policy = "git_tracked"
backup_policy = "git_tracked"
health_check_function = "_check_sot_registry_completeness"
owner_role = "shared"
depends_on = []
forbidden_substitutes = []
notes = "Registry row 1: the registry itself. Required by DCL-SOT-REGISTRY-PROJECTION-PARITY-001 bootstrap guarantee."

