# Runtime evidence retention policy.
# Authority: bridge/gtkb-fab-13-retention-policy-umbrella-005.md GO at -006.

[owner_decision_ledger]
archive_resolved_after_days = 30
archive_directory = "memory/archive"

[cross_harness_trigger]
dispatch_runs_retention_days = 14
dispatch_runs_max_bytes = 209715200
jsonl_max_bytes = 10485760
jsonl_rollovers = 5

[gtkb_state_gc]
age_days = 14
directory_name_tokens = ["pytest-tmp", "pytest_tmp", "pytest-cache", "uv-cache"]

