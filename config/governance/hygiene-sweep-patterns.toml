# GroundTruth-KB hygiene sweep pattern-set registry
#
# Drives the `gt hygiene sweep` deterministic CLI (WI-3420; bridge thread
# `gtkb-hygiene-sweep-cli` GO at -002).
#
# Per `GOV-ARTIFACT-APPROVAL-001`: this configuration artifact's initial
# content is approved via the bridge GO at -002. Future revisions go through
# standard formal-artifact-approval-packet workflow.
#
# Per `DELIB-S312-DETERMINISTIC-SERVICES-PRINCIPLE`: this pattern set captures
# the three S363 Agent-Red-inherited drift instances (WI-3409, WI-3417,
# WI-3418) into one deterministic discovery surface, replacing per-instance
# manual investigation.
#
# Pattern entry schema:
#   id                  - kebab-case stable identifier
#   class               - drift class (config_drift, workflow_drift, etc.)
#   description         - human-readable explanation
#   file_globs          - paths to scan (fnmatch syntax, forward-slash normalized)
#   content_patterns    - regex patterns (Python `re` syntax) to match
#   exclusion_globs     - paths to skip
#   classification      - finding classification tag
#   remediation_hint    - suggested next-step guidance
#
# Copyright (c) 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC.
# All rights reserved.

version = 1

[[patterns]]
id = "agent-red-config-drift"
class = "config_drift"
description = "Agent-Red-inherited config carried in GT-KB repo-root files (sonar key, GitHub Actions repo references, source-tree assumptions)."
file_globs = [
    "*.properties",
    ".github/workflows/*.yml",
    ".github/workflows/*.yaml",
    "pyproject.toml",
    "scripts/**/*.py",
    "sonar-project.properties",
]
content_patterns = [
    "Remaker-Digital_agent-red-customer-engagement",
    "AGENT_RED_GITHUB_REPO",
    "applications/Agent_Red/",
    "sonar\\.sources=src/",
]
exclusion_globs = [
    "applications/**",
    "bridge/**",
    "memory/**",
    "independent-progress-assessments/**",
    ".gtkb-state/**",
    "archive/**",
    ".claude/**",
    ".codex/**",
    "config/governance/hygiene-sweep-patterns.toml",
]
classification = "agent_red_inherited"
remediation_hint = "Verify path/key is in canonical GT-KB scope; relink if not. See bridge thread gtkb-sonarcloud-config-relink-gt-kb for the relink pattern."

# WI-4249 (gtkb-hygiene-sweep-presence-patterns-slice-1): presence-mode detection
# for path-presence drift classes — the file's existence under file_globs (and
# not under exclusion_globs) is itself the finding (match_mode = "presence";
# content_patterns not consulted). Report-only; remediation is child-bridge-gated
# (WI-4259). The pytest-basetemp ACL class is deferred pending WI-3469.

[[patterns]]
id = "runtime-residue-paths"
class = "runtime_residue"
description = "Rehearsal/sandbox runtime residue committed into the tracked tree — e.g. a nested PASS/bridge/ or PASS/.claude/ sandbox-output subtree (per the project-root-boundary sandbox exception, rehearsal output belongs outside the repo or under .gtkb-state, never committed in-tree)."
match_mode = "presence"
file_globs = [
    "**/PASS/bridge/**",
    "**/PASS/.claude/**",
    "**/PASS/.gtkb-state/**",
]
content_patterns = []
exclusion_globs = [
    ".gtkb-state/**",
    "archive/**",
    "applications/**",
    "bridge/**",
    "independent-progress-assessments/**",
]
classification = "runtime_residue"
remediation_hint = "Runtime/sandbox residue committed in-tree; scrub the PASS/ subtree. Sandbox output belongs outside E:/GT-KB or under .gtkb-state per .claude/rules/project-root-boundary.md. Scanner-owned-artifact severity handling is tracked by WI-4259."

[[patterns]]
id = "snapshots-non-manifest-recursion"
class = "config_drift"
description = "Self-recursing snapshot residue: a snapshots/ subtree nested within another snapshots/ subtree, indicating a snapshot captured its own snapshot output (non-manifest recursion)."
match_mode = "presence"
file_globs = [
    "**/snapshots/**/snapshots/**",
]
content_patterns = []
exclusion_globs = [
    ".gtkb-state/**",
    "archive/**",
    "applications/**",
]
classification = "snapshots_non_manifest"
remediation_hint = "Snapshot self-recursion detected (snapshots nested under snapshots). Verify the snapshot generator excludes prior snapshot output from its capture set; prune the recursive subtree."
