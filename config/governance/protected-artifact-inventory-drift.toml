schema_version = 1

volatile_inventory_paths = [
  "generated_at",
  "redaction.sensitive_environment_entry_count",
  "redaction.sensitive_environment_categories",
  # toolchain.*.version: tool version strings (pytest/ruff/pip/...) are read
  # via the interpreter that runs the drift checker. The pre-commit hook uses
  # the PATH `python`, which can differ from the canonical groundtruth-kb/.venv
  # interpreter, producing interpreter-specific phantom drift that froze
  # commits. Versions remain RECORDED in the inventory; only the version field
  # is non-blocking for drift. Non-version toolchain fields (status,
  # classification, presence) and all other inventory keys continue to gate.
  # Owner decision DELIB-2504 (S369) / WI-3449; the wildcard segment is honored
  # by _delete_dotted_path in scripts/check_dev_environment_inventory_drift.py.
  "toolchain.*.version",
  # toolchain.*.status and toolchain.*.classification: tool-availability fields
  # are workstation-specific. A workstation where ``gh --version`` (or any other
  # inventoried tool) fails records ``status: "unknown"`` and
  # ``classification: "unknown"``; a workstation where the tool succeeds records
  # ``"verified"``. Without volatility on these fields, env-specific tool
  # availability differences cause cross-workstation drift that gates every
  # cross-harness commit attempt (observed during Codex review at
  # bridge/gtkb-inventory-regen-chore-commit-2026-05-31-004.md P1-001).
  # Authorization: PAUTH-PROJECT-GTKB-RELIABILITY-FIXES-STANDING covers this
  # source/config drift-policy change under GOV-RELIABILITY-FAST-LANE-001;
  # DELIB-2504 is the closest prior owner-decision precedent (toolchain.*.version
  # volatility, 2026-05-29 chore). The bundled state/baseline commit that
  # carried this change is separately authorized by DELIB-2522. Tool-presence
  # regressions (catalog adds/removes) continue to gate via the toolchain
  # top-level key set.
  "toolchain.*.status",
  "toolchain.*.classification",
]

[[protected_artifacts]]
id = "harness-identity-and-role-state"
patterns = [
  "harness-state/harness-identities.json",
  "harness-state/role-assignments.json",
]
severity = "governance_review"
route = "governance_review"
accept_with_inventory_baseline_update = false
required_evidence = [
  "bridge report",
  "role assignment verification",
]

[[protected_artifacts]]
id = "role-and-governance-rules"
patterns = [
  ".claude/rules/**",
  "AGENTS.md",
  "CLAUDE.md",
]
severity = "governance_review"
route = "governance_review"
accept_with_inventory_baseline_update = false
required_evidence = [
  "bridge report",
  "governance review",
]

[[protected_artifacts]]
id = "hook-and-action-gates"
patterns = [
  ".claude/hooks/**",
  ".codex/gtkb-hooks/**",
  ".codex/hooks.json",
  ".githooks/**",
]
severity = "compatibility_tests"
route = "compatibility_tests"
accept_with_inventory_baseline_update = false
required_evidence = [
  "hook parity test",
  "compatibility tests",
]

[[protected_artifacts]]
id = "release-and-ci-gates"
patterns = [
  "scripts/release_candidate_gate.py",
  ".github/workflows/**",
]
severity = "release_blocker"
route = "release_blocker"
accept_with_inventory_baseline_update = false
required_evidence = [
  "release gate test",
  "workflow coverage test",
]

[[protected_artifacts]]
id = "inventory-collector-and-baseline"
patterns = [
  "scripts/collect_dev_environment_inventory.py",
  "scripts/check_dev_environment_inventory_drift.py",
  ".groundtruth/inventory/dev-environment-inventory.json",
  ".groundtruth/inventory/dev-environment-inventory.md",
  "config/governance/protected-artifact-inventory-drift.toml",
]
severity = "accepted_baseline_update"
route = "accepted_baseline_update"
accept_with_inventory_baseline_update = true
required_evidence = [
  "inventory regenerated",
  "normalized drift check",
]

[[protected_artifacts]]
id = "package-and-project-config"
patterns = [
  "groundtruth.toml",
  "groundtruth-kb/pyproject.toml",
  "pyproject.toml",
]
severity = "docs_review"
route = "docs_review"
accept_with_inventory_baseline_update = false
required_evidence = [
  "documentation review",
  "compatibility tests",
]

