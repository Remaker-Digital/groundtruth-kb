# Bridge dispatch configuration.
#
# Role membership, dispatchability, and event-firing capability are independent
# axes. Durable operating roles remain in harness-state/harness-registry.json;
# this file controls whether a role holder can receive headless bridge dispatch
# and how eligible candidates are ranked.

schema_version = 1
selection_order = ["quality", "cost", "availability", "reviewer_precedence", "harness_id"]

[harnesses.A]
description = "Codex: active Prime Builder and dispatchable PB target."
can_receive_dispatch = true
can_fire_events = true
dispatch_cost = 60
dispatch_quality = 90
dispatch_availability = 90
tags = ["prime-builder", "event-source"]

[harnesses.B]
description = "Claude Code: active Prime Builder; headless-dispatchable PB fallback (A wins on cost by default)."
can_receive_dispatch = true
can_fire_events = true
dispatch_cost = 60
dispatch_quality = 95
dispatch_availability = 75
tags = ["prime-builder", "event-source"]

[harnesses.C]
description = "Antigravity: Loyal Opposition dispatch target."
can_receive_dispatch = true
can_fire_events = false
dispatch_cost = 30
dispatch_quality = 80
dispatch_availability = 80
tags = ["loyal-opposition"]

[harnesses.D]
description = "Ollama-shim: cloud-routed LO dispatch target (current route: kimi-k2-7-code-cloud via cloud API)."
can_receive_dispatch = true
can_fire_events = false
dispatch_cost = 30
dispatch_quality = 80
dispatch_availability = 95
max_items = 2
tags = ["loyal-opposition", "low-cost"]

[harnesses.F]
description = "OpenRouter: low-cost Loyal Opposition dispatch target."
can_receive_dispatch = true
can_fire_events = false
dispatch_cost = 20
dispatch_quality = 80
dispatch_availability = 90
tags = ["loyal-opposition", "low-cost"]

[[rules]]
id = "bridge-prime-builder-default"
required_roles = ["prime-builder"]
statuses = ["GO", "NO-GO"]
prefer = ["quality", "cost", "availability", "reviewer_precedence", "harness_id"]

[[rules]]
id = "bridge-loyal-opposition-cheap-fast-default"
required_roles = ["loyal-opposition"]
statuses = ["NEW", "REVISED"]
prefer = ["quality", "cost", "availability", "reviewer_precedence", "harness_id"]