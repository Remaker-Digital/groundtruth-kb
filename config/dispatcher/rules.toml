tags = ["loyal-opposition"]

[harnesses.D]
description = "Ollama-shim: cloud-routed LO dispatch target (current route: kimi-k2-7-code-cloud via cloud API)."
can_receive_dispatch = false
can_fire_events = false
dispatch_cost = 30
dispatch_quality = 80
dispatch_availability = 95
max_items = 2
tags = ["loyal-opposition", "low-cost"]

[harnesses.E]
description = "Cursor: high-quality dispatch target."
can_receive_dispatch = true
can_fire_events = true
dispatch_cost = 20
dispatch_quality = 80
dispatch_availability = 90
max_items = 3
