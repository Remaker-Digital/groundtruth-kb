schema_version = 1
selection_order = ["quality", "cost", "availability", "reviewer_precedence", "harness_id"]

[budget]
enabled = false
per_session_usd = 0.0
per_user_daily_usd = 0.0
soft_session_usd = 0.0
unknown_model_policy = "fail_closed"
unpriced_model_policy = "fail_open"

[budget.harnesses.A]
model = "gpt-5-codex"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[budget.harnesses.B]
model = "claude-code"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[budget.harnesses.C]
model = "gemini-2.5-flash"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[budget.harnesses.D]
model = "kimi-k2-7-code-cloud"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[budget.harnesses.E]
model = "cursor-agent"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[budget.harnesses.F]
model = "openrouter"
pricing = "priced"
estimated_usd_per_dispatch = 0.0

[harnesses.A]
description = "Codex: high-quality dispatch target."
can_receive_dispatch = true
can_fire_events = true
dispatch_cost = 60
dispatch_quality = 90
dispatch_availability = 90
tags = ["prime-builder", "event-source"]

[harnesses.B]
description = "Claude Code: high-quality dispatch target."
can_receive_dispatch = false
can_fire_events = false
dispatch_cost = 60
dispatch_quality = 95
dispatch_availability = 75
max_items = 3
tags = ["prime-builder", "event-source"]

[harnesses.C]
description = "Antigravity: Loyal Opposition dispatch target."
can_receive_dispatch = false
can_fire_events = false
dispatch_cost = 30
dispatch_quality = 80
dispatch_availability = 80
tags = ["loyal-opposition"]

[harnesses.D]
description = "Ollama-shim: cloud-routed LO dispatch target (current route: kimi-k2-7-code-cloud via cloud API)."
can_receive_dispatch = true
can_fire_events = false
dispatch_cost = 30
dispatch_quality = 80
dispatch_availability = 95
max_items = 2
tags = ["loyal-opposition", "low-cost"]

[harnesses.E]
description = "Cursor: high-quality dispatch target."
can_receive_dispatch = true
can_fire_events = true
dispatch_cost = 20
dispatch_quality = 80
dispatch_availability = 90
max_items = 3
tags = ["prime-builder"]

[harnesses.F]
description = "OpenRouter: low-cost Loyal Opposition dispatch target."
can_receive_dispatch = true
can_fire_events = false
dispatch_cost = 20
dispatch_quality = 80
dispatch_availability = 90
tags = ["loyal-opposition", "low-cost"]

[[rules]]
id = "bridge-prime-builder-default"
required_roles = ["prime-builder"]
statuses = ["GO", "NO-GO"]
prefer = ["availability", "quality", "cost"]

[[rules]]
id = "bridge-loyal-opposition-cheap-fast-default"
required_roles = ["loyal-opposition"]
statuses = ["NEW", "REVISED"]
prefer = ["availability", "quality", "cost"]
