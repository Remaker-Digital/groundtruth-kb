[[rules]]
id = "bridge-prime-builder-default"
required_roles = ["prime-builder"]
statuses = ["GO", "NO-GO"]
prefer = ["availability", "quality", "cost"]

[[rules]]
id = "bridge-loyal-opposition-cheap-fast-default"
required_roles = ["loyal-opposition"]
statuses = ["NEW", "REVISED"]
prefer = ["availability", "quality", "cost"]
