# ---------------------------------------------------------------------------
# pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short --strict-markers --timeout=30"
markers = [
    "unit: fast, isolated unit tests (no I/O, no network)",
    "integration: cross-module integration tests (may use mocks for external services)",
    "e2e: end-to-end tests requiring full application stack",
    "slow: tests that take >2 seconds",
    "security: adversarial and security-focused tests",
    "tier0: blocking regression tests — must pass for every deployment",
    "tier1: pre-launch gate regression tests — must pass before traffic cutover",
    "tier2: post-deploy smoke tests — performance and latency validation",
    "sequential: tests that must not run in parallel (live endpoints, session fixtures)",
    "visual: visual regression tests requiring Playwright + Vite dev server (Layer 1-2)",
    "nats: tests requiring a live NATS JetStream server (nats://localhost:4222)",
]
filterwarnings = [
    "ignore::DeprecationWarning:pkg_resources",
    "ignore::DeprecationWarning:google.protobuf",
    "ignore::PendingDeprecationWarning",
    "ignore::DeprecationWarning:src.main",
    "ignore::DeprecationWarning:fastapi",
]

# ---------------------------------------------------------------------------
# coverage
# ---------------------------------------------------------------------------

[tool.coverage.run]
source = ["src"]
omit = [
    "src/__init__.py",
    "src/*/__init__.py",
]

[tool.coverage.report]
# Ramp plan: 20% (baseline) → 50% (P0 tests) → 70% (current) → 80% (launch target)
# Updated 2026-02-05: 1,439 unit tests covering all 44 multi_tenant modules,
# 19 routers, and 11 integration modules.  Current coverage: 73.1%.
# Gate raised from 50% to 70%.  Next target: 80% at launch.
fail_under = 70
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
    "pass",
    "\\.\\.\\.\\s*$",
]

# ---------------------------------------------------------------------------
# ruff — fast Python linter + formatter (replaces flake8, isort, pyupgrade)
# ---------------------------------------------------------------------------

[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
# Start permissive — tighten iteratively. E/F are pycodestyle + pyflakes
# (equivalent to flake8 defaults). I = isort. UP = pyupgrade.
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
    "E501",    # line too long — handled by formatter
    "E741",    # ambiguous variable name (l, O, I) — common in math/data code
    "B008",    # function-call-in-default-argument — FastAPI Depends() pattern
    "B905",    # zip-without-explicit-strict — too noisy for existing code
    "SIM108",  # use-ternary-operator — sometimes if/else is clearer
    "UP007",   # non-pep604-annotation — X | Y vs Optional[X] preference
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "E501",    # long test names and assertions are fine
    "B011",    # assert False is valid in tests
    "SIM300",  # yoda conditions in assertions are fine
]
"scripts/**" = [
    "E501",    # scripts can have long lines
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
