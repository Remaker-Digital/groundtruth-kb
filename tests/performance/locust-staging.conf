# Locust load test configuration for Agent Red — STAGING environment
#
# Phase C of DOC-135 (Co-Pilot deployment plan).
# Targets the staging container app (single replica, min=0 max=1).
#
# Usage:
#   locust -f tests/performance/locustfile.py --config tests/performance/locust-staging.conf
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

# Target host — staging FQDN
host = https://agent-red-staging.orangeglacier-f566a4e7.eastus.azurecontainerapps.io

# Default user count and spawn rate (Phase C-2: moderate load)
users = 50
spawn-rate = 5

# Run duration
run-time = 2m

# Headless mode for CI
headless = true

# Output HTML report
html = tests/performance/staging-load-test-report.html

# CSV output for post-run analysis
csv = tests/performance/staging-load-test-results

# Log level
loglevel = WARNING

# Only count successful requests for percentile calculations
only-summary = true
