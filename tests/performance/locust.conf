# Locust load test configuration for Agent Red Customer Experience
#
# Default settings for local development testing.
# Override on the command line or with environment variables as needed.
#
# Usage:
#   locust -f tests/performance/locustfile.py --config tests/performance/locust.conf
#
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

# Target host (override with --host for production)
host = http://localhost:8000

# Default user count and spawn rate
users = 20
spawn-rate = 2

# Default run duration (2 minutes for local testing)
run-time = 2m

# Web UI disabled for CI — enable with --web-ui for interactive use
headless = true

# Output HTML report
html = tests/performance/load-test-report.html

# CSV output for post-run analysis
csv = tests/performance/load-test-results

# Log level
loglevel = WARNING

# Only count successful requests for percentile calculations
only-summary = true
