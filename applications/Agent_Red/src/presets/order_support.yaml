knowledge_seed:
  - title: "Shipping Information"
    content: |
      We offer several shipping options to get your order to you
      as quickly as possible.

      **Shipping Methods:**
      - Standard Shipping: 5-7 business days
      - Expedited Shipping: 2-3 business days
      - Overnight Shipping: Next business day (order by 2 PM)

      **Tracking Your Order:**
      - You'll receive a tracking email once your order ships
      - Track your package using the link in your confirmation email
      - Ask our AI assistant for real-time tracking updates

      **International Shipping:**
      - Available to select countries
      - Delivery times vary by destination (7-21 business days)
      - Customer is responsible for customs duties and taxes
    category: "policies"
  - title: "Order Modifications & Cancellations"
    content: |
      Need to change or cancel your order? Here's what you need
      to know:

      **Cancellations:**
      - Orders can be cancelled within 1 hour of placement
      - After 1 hour, we'll attempt to cancel but cannot guarantee
      - Refunds for cancelled orders process within 3-5 business days

      **Modifications:**
      - Address changes are possible before shipping
      - Item changes may require cancelling and reordering
      - Contact us as soon as possible for the best chance of changes

      **Payment Issues:**
      - If a charge appears incorrect, contact us with your order number
      - We can provide itemized receipts for any order
      - Refunds return to the original payment method
    category: "processes"
  - title: "Payment & Billing FAQ"
    content: |
      **Accepted Payment Methods:**
      - Credit/debit cards (Visa, Mastercard, Amex, Discover)
      - PayPal
      - Shop Pay
      - Apple Pay and Google Pay

      **When am I charged?**
      Your payment is processed when you place your order.
      Pre-authorization holds may appear on your statement.

      **Refund Timeline:**
      - Refunds are initiated within 24 hours of approval
      - Bank processing takes 3-7 business days
      - PayPal refunds appear within 1-2 business days
    category: "policies"

agents_recommended:
