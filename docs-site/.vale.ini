# Vale configuration for Agent Red documentation
# https://vale.sh/docs/vale-ini/

StylesPath = .vale/styles
MinAlertLevel = warning

Packages = Google, write-good, alex, Readability

# Docusaurus markdown files
[docs/**/*.md]
BasedOnStyles = Vale, Google, write-good, alex, Readability, AgentRed

# Relax some Google rules that conflict with Docusaurus conventions
Google.Headings = NO
Google.Parens = NO
Google.Spacing = NO

# Readability thresholds
Readability.FleschKincaid = warning

# Ignore code blocks and frontmatter
BlockIgnores = (?s)^---\n.*?\n---\n
TokenIgnores = (`[^`]+`)

[docs/**/*.mdx]
BasedOnStyles = Vale, Google, write-good, alex, Readability, AgentRed
Google.Headings = NO
Google.Parens = NO
Google.Spacing = NO
Readability.FleschKincaid = warning
BlockIgnores = (?s)^---\n.*?\n---\n
TokenIgnores = (`[^`]+`)
