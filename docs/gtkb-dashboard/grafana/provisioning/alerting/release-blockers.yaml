apiVersion: 1

# Authoritative source for this alert rule:
#   - current_metrics.metric_key = 'release_blockers'
#     emitted by scripts/gtkb_dashboard/refresh_dashboard_db.py via
#     _current_metric_rows(...) (see line referencing 'release_blockers').
# Condition: value > 0.
# Destination is the Grafana alert list only. External notifier wiring is
# Slice 2 scope (bridge gtkb-dashboard-industry-alignment-slice2).

groups:
  - orgId: 1
    name: agent-red-release-readiness
    folder: GroundTruth-KB
    interval: 1m
    rules:
      - uid: agent-red-release-blockers
        title: Release Blockers
        condition: B
        for: 0s
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: gtkb-dashboard-sqlite
            model:
              refId: A
              datasource:
                type: frser-sqlite-datasource
                uid: gtkb-dashboard-sqlite
              format: table
              queryType: table
              rawSql: "SELECT value FROM current_metrics WHERE metric_key = 'release_blockers';"
              rawQueryText: "SELECT value FROM current_metrics WHERE metric_key = 'release_blockers';"
              queryText: "SELECT value FROM current_metrics WHERE metric_key = 'release_blockers';"
              timeColumns: []
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                    params: []
                  type: query
        annotations:
          summary: "Release blockers visible on GroundTruth-KB dashboard."
          source_metric_key: release_blockers
          source_table: current_metrics
        labels:
          severity: blocker
          scope: release
