apiVersion: 1

# Authoritative source for this alert rule:
#   - current_metrics.metric_key = 'ci_testing_failing'
#     emitted by scripts/gtkb_dashboard/refresh_dashboard_db.py via
#     _current_metric_rows(...) (see line referencing 'ci_testing_failing').
# Condition: value > 0.
# Destination is the Grafana alert list only. External notifier wiring is
# Slice 2 scope.

groups:
  - orgId: 1
    name: agent-red-ci-health
    folder: Agent Red GT-KB
    interval: 1m
    rules:
      - uid: agent-red-failing-ci
        title: CI / Testing Failing
        condition: B
        for: 0s
        noDataState: OK
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: gtkb-dashboard-sqlite
            model:
              refId: A
              datasource:
                type: frser-sqlite-datasource
                uid: gtkb-dashboard-sqlite
              format: table
              queryType: table
              rawSql: "SELECT value FROM current_metrics WHERE metric_key = 'ci_testing_failing';"
              rawQueryText: "SELECT value FROM current_metrics WHERE metric_key = 'ci_testing_failing';"
              queryText: "SELECT value FROM current_metrics WHERE metric_key = 'ci_testing_failing';"
              timeColumns: []
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              refId: B
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    type: last
                    params: []
                  type: query
        annotations:
          summary: "Failing CI / testing integrations visible on Agent Red GT-KB dashboard."
          source_metric_key: ci_testing_failing
          source_table: current_metrics
        labels:
          severity: warning
          scope: ci
