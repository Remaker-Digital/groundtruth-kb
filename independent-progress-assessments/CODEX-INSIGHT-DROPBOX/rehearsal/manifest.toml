# GTKB-ISOLATION-016 Phase 8 rehearsal manifest.
# Authority: ADR-ISOLATION-APPLICATION-PLACEMENT-001 (upstream commit
# affa5a0567a64f79bb4c5aae891889d4af50a72a; authoritative form at
# docs/architecture/adrs/ADR-ISOLATION-APPLICATION-PLACEMENT-001.md
# in upstream groundtruth-kb).
#
# Wave 1 shipped the structural manifest with placeholders.
# §3.3 + §3.5 owner decisions landed 2026-04-26 (S311) per
# bridge/gtkb-isolation-016-phase8-wave2-implementation-003.md REVISED.

target_root = "E:/GT-KB/applications/Agent_Red"
legacy_root = "E:/GT-KB"
applications_namespace = "E:/GT-KB/applications"

# §3.3 owner decision 2026-04-26 (S311): sandbox dir (clean-room rehearsal).
# Driver appends ISO timestamp at runtime to produce a unique run-specific
# path: C:/temp/agent-red-rehearsal-{ISO_TIMESTAMP}/. The path lives
# outside any cloud-synced location (per the S311 KB recovery incident
# lessons that motivated the .driveignore patch in commit 12538b97).
output_dir = "C:/temp/agent-red-rehearsal"

# §3.5 owner decision 2026-04-26 (S311): clone with history filter.
# Use git filter-repo to extract Agent Red commits into a fresh repo
# whose root is the Agent_Red sub-tree. Preserves Agent Red authorship
# and blame at the new root; rewrites SHAs (acceptable trade-off per
# owner). Pre-condition: Agent Red files are not yet under
# applications/Agent_Red/ in the legacy root, so the filter must use
# --path enumeration of current paths plus --path-rename to map each
# to the new namespace. Wave 2's _path_rewrite sub-script computes
# the exact path list before invocation.
git_strategy = "clone_with_history_filter"
git_filter_command_template = "git filter-repo --path <agent-red-paths-from-_path_rewrite> --path-rename <each-source>:applications/Agent_Red/<each-target>"

# §3.6 owner decision 2026-05-01 (S325): manifest_driven_filter strategy.
# Per DELIB-S325-DB-RECONCILIATION-STRATEGY-CHOICE and
# bridge/gtkb-isolation-016-phase8-wave3-execution-007.md (REVISED-3, GO -008).
# Selected over four alternatives (replay log, read-only deferral,
# service-backed split, snapshot+freeze without filter); reuses Slice 8's
# row-level partition manifest and the new _db_filter_dryrun.py consumer.
db_reconciliation_strategy = "manifest_driven_filter"

# §3.7 owner decision 2026-05-01 (S325): leave_behind_with_warning default.
# Per DELIB-S325-UNCLASSIFIED-DISPOSITION-CHOICE.
# Rows the Slice 8 classifier cannot disambiguate are emitted as warnings
# and excluded from the filtered preview DB. ISOLATION-018 cutover reads
# the warning list as the manual-reclassification queue. Preserves
# Slice 8 Constraint 4 (silent default to adopter is rejected).
unclassified_disposition = "leave_behind_with_warning"

# Authority matrix path corrected per Codex
# bridge/gtkb-isolation-016-phase8-wave2-implementation-002.md NO-GO:
# the file lives under the PHASE1-AUTHORITY-MATRIX-PLAN naming with
# the 2026-04-22 date suffix.
phase_1_authority_matrix_path = "independent-progress-assessments/CODEX-INSIGHT-DROPBOX/GTKB-ISOLATION-001-PHASE1-AUTHORITY-MATRIX-PLAN-2026-04-22.md"

excluded_paths = [
    ".env",
    ".env.local",
    "secrets/",
    "groundtruth-artifacts/secrets/",
    ".tmp.driveupload/",
]

python_version = "3.14"
drift_tolerance = "strict"

# Surface treatments populated by Wave 2 lane 1 (_inventory.py) at
# first run, by reading phase_1_authority_matrix_path above and
# emitting one entry per matrix row. Schema per matrix Required
# Matrix Shape (surface_id, path, capability, environment, generated,
# canonical owner, subject authority, access model, verification
# evidence). Hand-authoring this section is explicitly NOT done in
