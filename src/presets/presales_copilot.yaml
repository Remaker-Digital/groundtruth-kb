# Pre-Sales Copilot — product questions and recommendations
# © 2026 Remaker Digital, a DBA of VanDusen & Palmeter, LLC. All rights reserved.

id: presales_copilot
display_name: "Pre-Sales Copilot"
description: "Product questions, recommendations, and buying guidance for shoppers"
icon: "shopping-cart"

preferences:
  brand_voice: "enthusiastic and knowledgeable"
  formality_level: "casual"
  response_length: "detailed"
  escalation_threshold: 0.6
  escalation_keywords:
    - "competitor"
    - "too expensive"
    - "price match"
    - "bulk order"
    - "wholesale"
  custom_instructions: |
    Help customers find the right products for their needs.
    Ask clarifying questions to understand what they're looking for.
    Highlight product benefits and unique selling points.
    Suggest complementary products when appropriate.
    Never pressure customers — guide them to informed decisions.

quick_actions:
  - label: "Find a Product"
    message: "I'm looking for a product but not sure which one is right for me"
  - label: "Compare Products"
    message: "Can you help me compare a few products to decide which one to buy?"
  - label: "Check Availability"
    message: "Is this product currently in stock?"

widget:
  greeting_message: "Welcome! Looking for something specific? I can help you find the perfect product."
  input_placeholder: "What are you looking for today?"

knowledge_seed:
  - title: "Shopping Guide"
    content: |
      Welcome to our store! Here's how to make the most of
      your shopping experience:

      **Finding Products:**
      - Browse by category using the main navigation
      - Use the search bar for specific items
      - Ask our AI assistant for personalized recommendations

      **Product Information:**
      - Each product page includes detailed descriptions
      - Check size guides before ordering apparel
      - Read customer reviews for real-world feedback

      **Ordering:**
      - Add items to your cart and checkout when ready
      - We offer multiple payment methods
      - Free shipping on orders over a certain amount
    category: "general"
  - title: "Product Recommendations"
    content: |
      Not sure what to buy? Our AI assistant can help you find
      the right products based on your needs.

      **Tell us about:**
      - What you're looking for (gift, personal use, etc.)
      - Your budget range
      - Any specific features or requirements
      - Size, color, or style preferences

      We'll suggest products that match your criteria and explain
      why each one might be a good fit for you.
    category: "general"

agents_recommended:
  - agent_id: sales
    tier_required: professional
    reason: "Product search, cart management, and checkout assistance"
  - agent_id: campaigns
    tier_required: professional
    reason: "Active promotions and discount code lookup"
